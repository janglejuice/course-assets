<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="720" height="380" fill="#FFFFFF"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#141B5C">The Four-Phase Real Estate Cycle</text>

  <!-- baseline / axis -->
  <line x1="60" y1="300" x2="690" y2="300" stroke="#E5E7EB" stroke-width="2"/>
  <text x="60" y="328" text-anchor="start" font-size="12" fill="#374151">Time</text>
  <text x="40" y="180" text-anchor="middle" font-size="12" fill="#374151" transform="rotate(-90 40 180)">Market activity / prices</text>

  <!-- the wave: trough up to peak, down to trough, up again -->
  <path d="M 80 270 C 170 270, 200 110, 290 110 C 360 110, 360 110, 380 110 C 470 110, 500 270, 590 270 C 660 270, 660 150, 690 130"
        fill="none" stroke="#1E2A8E" stroke-width="3.5"/>

  <!-- phase markers -->
  <!-- expansion -->
  <circle cx="185" cy="200" r="6" fill="#3E9B6B"/>
  <text x="185" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#3E9B6B">Expansion</text>
  <text x="185" y="250" text-anchor="middle" font-size="11" fill="#374151">prices rising,</text>
  <text x="185" y="265" text-anchor="middle" font-size="11" fill="#374151">building starts</text>

  <!-- peak -->
  <circle cx="335" cy="110" r="6" fill="#D4AF37"/>
  <text x="335" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#B9912B">Peak</text>
  <text x="335" y="76" text-anchor="middle" font-size="11" fill="#374151">prices highest</text>

  <!-- contraction -->
  <circle cx="495" cy="200" r="6" fill="#C4683A"/>
  <text x="495" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#C4683A">Contraction</text>
  <text x="495" y="250" text-anchor="middle" font-size="11" fill="#374151">oversupply,</text>
  <text x="495" y="265" text-anchor="middle" font-size="11" fill="#374151">prices fall</text>

  <!-- trough -->
  <circle cx="600" cy="270" r="6" fill="#141B5C"/>
  <text x="618" y="296" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Trough</text>
  <text x="618" y="314" text-anchor="middle" font-size="11" fill="#374151">bottom; next</text>
  <text x="618" y="329" text-anchor="middle" font-size="11" fill="#374151">cycle begins</text>

  <text x="360" y="362" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">The pattern repeats, but the length and depth of each phase vary.</text>
</svg>
