<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="560" fill="#FFFFFF"/>

  <text x="30" y="40" font-size="22" font-weight="bold" fill="#141B5C">Escrow: the deposit timeline and the dispute path</text>

  <!-- Timeline section -->
  <text x="30" y="78" font-size="15" font-weight="bold" fill="#374151">1. Getting the deposit into safekeeping</text>

  <!-- timeline base line -->
  <line x1="60" y1="150" x2="700" y2="150" stroke="#E5E7EB" stroke-width="4"/>

  <!-- node: associate receives -->
  <circle cx="120" cy="150" r="11" fill="#1E2A8E"/>
  <text x="120" y="125" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">Associate</text>
  <text x="120" y="180" font-size="12" fill="#374151" text-anchor="middle">receives deposit</text>

  <!-- arrow to broker -->
  <line x1="135" y1="150" x2="345" y2="150" stroke="#D4AF37" stroke-width="4"/>
  <polygon points="345,150 333,144 333,156" fill="#D4AF37"/>
  <text x="235" y="142" font-size="12" font-weight="bold" fill="#C4683A" text-anchor="middle">by end of next business day</text>

  <!-- node: broker receives -->
  <circle cx="360" cy="150" r="11" fill="#1E2A8E"/>
  <text x="360" y="125" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">Broker</text>
  <text x="360" y="180" font-size="12" fill="#374151" text-anchor="middle">receives deposit</text>

  <!-- arrow to bank -->
  <line x1="375" y1="150" x2="625" y2="150" stroke="#D4AF37" stroke-width="4"/>
  <polygon points="625,150 613,144 613,156" fill="#D4AF37"/>
  <text x="500" y="142" font-size="12" font-weight="bold" fill="#C4683A" text-anchor="middle">by end of 3rd business day</text>

  <!-- node: escrow account -->
  <circle cx="640" cy="150" r="11" fill="#3E9B6B"/>
  <text x="640" y="125" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">Escrow</text>
  <text x="640" y="180" font-size="12" fill="#374151" text-anchor="middle">account</text>

  <!-- Dispute section -->
  <text x="30" y="240" font-size="15" font-weight="bold" fill="#374151">2. Conflicting demands with good-faith doubt</text>

  <!-- decision box -->
  <rect x="250" y="262" width="260" height="60" rx="8" fill="#141B5C"/>
  <text x="380" y="288" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Buyer and seller both claim</text>
  <text x="380" y="308" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">the same deposit</text>

  <!-- notice step -->
  <line x1="380" y1="322" x2="380" y2="352" stroke="#374151" stroke-width="3"/>
  <polygon points="380,352 374,340 386,340" fill="#374151"/>
  <rect x="210" y="354" width="340" height="52" rx="8" fill="#D4AF37"/>
  <text x="380" y="378" font-size="13" font-weight="bold" fill="#141B5C" text-anchor="middle">Notify FREC in writing within 15 business days,</text>
  <text x="380" y="396" font-size="13" font-weight="bold" fill="#141B5C" text-anchor="middle">then choose a procedure within 30 business days</text>

  <!-- branch line -->
  <line x1="380" y1="406" x2="380" y2="430" stroke="#374151" stroke-width="3"/>
  <line x1="115" y1="430" x2="645" y2="430" stroke="#374151" stroke-width="3"/>

  <!-- four options -->
  <line x1="115" y1="430" x2="115" y2="456" stroke="#374151" stroke-width="3"/>
  <line x1="293" y1="430" x2="293" y2="456" stroke="#374151" stroke-width="3"/>
  <line x1="468" y1="430" x2="468" y2="456" stroke="#374151" stroke-width="3"/>
  <line x1="645" y1="430" x2="645" y2="456" stroke="#374151" stroke-width="3"/>

  <rect x="40" y="456" width="150" height="70" rx="8" fill="#FFFFFF" stroke="#3E9B6B" stroke-width="2"/>
  <text x="115" y="486" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">Mediation</text>
  <text x="115" y="506" font-size="11" fill="#374151" text-anchor="middle">both must agree</text>

  <rect x="218" y="456" width="150" height="70" rx="8" fill="#FFFFFF" stroke="#3E9B6B" stroke-width="2"/>
  <text x="293" y="486" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">Arbitration</text>
  <text x="293" y="506" font-size="11" fill="#374151" text-anchor="middle">binding decision</text>

  <rect x="393" y="456" width="150" height="70" rx="8" fill="#FFFFFF" stroke="#3E9B6B" stroke-width="2"/>
  <text x="468" y="480" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">Litigation</text>
  <text x="468" y="498" font-size="11" fill="#374151" text-anchor="middle">interpleader:</text>
  <text x="468" y="514" font-size="11" fill="#374151" text-anchor="middle">court decides</text>

  <rect x="570" y="456" width="150" height="70" rx="8" fill="#FFFFFF" stroke="#C4683A" stroke-width="2"/>
  <text x="645" y="480" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">EDO from FREC</text>
  <text x="645" y="498" font-size="11" fill="#374151" text-anchor="middle">residential 4 units</text>
  <text x="645" y="514" font-size="11" fill="#374151" text-anchor="middle">or fewer; no suit</text>
</svg>
