<svg viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="560" height="420" fill="#ffffff"/>
  <text x="280" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#141B5C">A Metes-and-Bounds Parcel</text>
  <text x="280" y="56" text-anchor="middle" font-size="13" fill="#374151">Start at the point of beginning, follow each course and distance, return to start</text>

  <!-- compass -->
  <g transform="translate(500,110)">
    <line x1="0" y1="22" x2="0" y2="-22" stroke="#374151" stroke-width="1.5"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#374151" stroke-width="1.5"/>
    <polygon points="0,-28 -5,-18 5,-18" fill="#1E2A8E"/>
    <text x="0" y="-32" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E2A8E">N</text>
    <text x="0" y="40" text-anchor="middle" font-size="11" fill="#374151">S</text>
    <text x="32" y="4" text-anchor="middle" font-size="11" fill="#374151">E</text>
    <text x="-32" y="4" text-anchor="middle" font-size="11" fill="#374151">W</text>
  </g>

  <!-- parcel rectangle: SW corner (POB) bottom-left -->
  <!-- coordinates: x 130..400, y 130..340 -->
  <rect x="130" y="130" width="270" height="210" fill="#3E9B6B" fill-opacity="0.12" stroke="#1E2A8E" stroke-width="3"/>

  <!-- corner monuments -->
  <circle cx="130" cy="340" r="7" fill="#D4AF37" stroke="#141B5C" stroke-width="2"/>
  <circle cx="130" cy="130" r="5" fill="#C4683A" stroke="#141B5C" stroke-width="1.5"/>
  <circle cx="400" cy="130" r="5" fill="#C4683A" stroke="#141B5C" stroke-width="1.5"/>
  <circle cx="400" cy="340" r="5" fill="#C4683A" stroke="#141B5C" stroke-width="1.5"/>

  <!-- POB label -->
  <text x="118" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#141B5C">POB</text>
  <text x="120" y="378" text-anchor="middle" font-size="10" fill="#374151">(iron pipe, SW corner)</text>

  <!-- direction arrows along edges -->
  <!-- west edge going up -->
  <polygon points="130,232 125,244 135,244" fill="#1E2A8E"/>
  <!-- north edge going right -->
  <polygon points="268,130 256,125 256,135" fill="#1E2A8E"/>
  <!-- east edge going down -->
  <polygon points="400,238 395,226 405,226" fill="#1E2A8E"/>
  <!-- south edge going left -->
  <polygon points="262,340 274,335 274,345" fill="#1E2A8E"/>

  <!-- edge labels -->
  <text x="124" y="235" text-anchor="end" font-size="12" fill="#141B5C" font-weight="bold">N 00&#176; E</text>
  <text x="124" y="251" text-anchor="end" font-size="11" fill="#374151">200 ft</text>

  <text x="265" y="118" text-anchor="middle" font-size="12" fill="#141B5C" font-weight="bold">N 90&#176; E, 300 ft</text>

  <text x="408" y="235" text-anchor="start" font-size="12" fill="#141B5C" font-weight="bold">S 00&#176; W</text>
  <text x="408" y="251" text-anchor="start" font-size="11" fill="#374151">200 ft</text>

  <text x="265" y="362" text-anchor="middle" font-size="12" fill="#141B5C" font-weight="bold">S 90&#176; W, 300 ft (to POB)</text>

  <!-- area note -->
  <text x="265" y="240" text-anchor="middle" font-size="13" fill="#3E9B6B" font-weight="bold">200 ft &#215; 300 ft</text>
  <text x="265" y="258" text-anchor="middle" font-size="12" fill="#374151">= 60,000 sq ft</text>
</svg>
