<svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="720" height="540" fill="#FFFFFF"/>
  <text x="360" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#141B5C">Estates in Land: From Greatest to Least Interest</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" fill="#374151">An estate is the degree, quantity, and duration of a person's interest in land.</text>

  <!-- Two-branch split labels -->
  <line x1="360" y1="74" x2="360" y2="98" stroke="#374151" stroke-width="2"/>
  <line x1="190" y1="98" x2="530" y2="98" stroke="#374151" stroke-width="2"/>
  <line x1="190" y1="98" x2="190" y2="118" stroke="#374151" stroke-width="2"/>
  <line x1="530" y1="98" x2="530" y2="118" stroke="#374151" stroke-width="2"/>

  <!-- FREEHOLD column header -->
  <rect x="40" y="118" width="300" height="40" rx="6" fill="#1E2A8E"/>
  <text x="190" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">FREEHOLD ESTATES</text>
  <text x="190" y="152" text-anchor="middle" font-size="11" fill="#FFFFFF">Ownership. Indefinite duration.</text>

  <!-- LEASEHOLD column header -->
  <rect x="380" y="118" width="300" height="40" rx="6" fill="#3E9B6B"/>
  <text x="530" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">LEASEHOLD (NON-FREEHOLD)</text>
  <text x="530" y="152" text-anchor="middle" font-size="11" fill="#FFFFFF">Possession only. Fixed or defined term.</text>

  <!-- Freehold tiers -->
  <rect x="40" y="176" width="300" height="58" rx="6" fill="#FFFFFF" stroke="#D4AF37" stroke-width="3"/>
  <text x="190" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#141B5C">Fee Simple Absolute</text>
  <text x="190" y="219" text-anchor="middle" font-size="11" fill="#374151">Largest interest. Full bundle, forever, inheritable.</text>

  <rect x="40" y="246" width="300" height="58" rx="6" fill="#FFFFFF" stroke="#C4683A" stroke-width="2"/>
  <text x="190" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#141B5C">Defeasible Fee</text>
  <text x="190" y="289" text-anchor="middle" font-size="11" fill="#374151">Ownership that can end if a condition is broken.</text>

  <rect x="40" y="316" width="300" height="58" rx="6" fill="#FFFFFF" stroke="#1E2A8E" stroke-width="2"/>
  <text x="190" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#141B5C">Life Estate</text>
  <text x="190" y="359" text-anchor="middle" font-size="11" fill="#374151">Lasts only for someone's lifetime, then passes on.</text>

  <!-- Leasehold tiers -->
  <rect x="380" y="176" width="300" height="44" rx="6" fill="#FFFFFF" stroke="#3E9B6B" stroke-width="2"/>
  <text x="530" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Estate for Years</text>
  <text x="530" y="212" text-anchor="middle" font-size="10.5" fill="#374151">Fixed start and end dates. No notice to end.</text>

  <rect x="380" y="230" width="300" height="44" rx="6" fill="#FFFFFF" stroke="#3E9B6B" stroke-width="2"/>
  <text x="530" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Periodic Tenancy</text>
  <text x="530" y="266" text-anchor="middle" font-size="10.5" fill="#374151">Renews period to period. Ends with notice.</text>

  <rect x="380" y="284" width="300" height="44" rx="6" fill="#FFFFFF" stroke="#3E9B6B" stroke-width="2"/>
  <text x="530" y="304" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Tenancy at Will</text>
  <text x="530" y="320" text-anchor="middle" font-size="10.5" fill="#374151">No fixed term. Ends when either party chooses.</text>

  <rect x="380" y="338" width="300" height="44" rx="6" fill="#FFFFFF" stroke="#C4683A" stroke-width="2"/>
  <text x="530" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Tenancy at Sufferance</text>
  <text x="530" y="374" text-anchor="middle" font-size="10.5" fill="#374151">Tenant overstays a lawful lease. Least interest.</text>

  <!-- Arrows showing descending interest -->
  <text x="22" y="180" font-size="11" fill="#374151" transform="rotate(-90 22 275)" text-anchor="middle">Greatest interest  to  least interest</text>
  <line x1="30" y1="176" x2="30" y2="374" stroke="#D4AF37" stroke-width="2"/>
  <polygon points="30,380 26,370 34,370" fill="#D4AF37"/>

  <!-- Footnote -->
  <rect x="40" y="404" width="640" height="110" rx="6" fill="#141B5C"/>
  <text x="60" y="430" font-size="12.5" font-weight="bold" fill="#D4AF37">The dividing line</text>
  <text x="60" y="452" font-size="12" fill="#FFFFFF">Freehold estates are OWNERSHIP and last an indefinite time (you own it).</text>
  <text x="60" y="472" font-size="12" fill="#FFFFFF">Leasehold estates are POSSESSION for a defined or terminable time (you rent it).</text>
  <text x="60" y="496" font-size="11.5" fill="#FFFFFF">Florida homestead protection attaches to a person's primary residence and limits how it can be conveyed.</text>
</svg>
