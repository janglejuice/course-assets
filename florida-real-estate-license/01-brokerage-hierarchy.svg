<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#141B5C">How a Sales Associate Sits Inside a Brokerage</text>

  <!-- Broker box (top) -->
  <rect x="220" y="60" width="200" height="62" rx="8" fill="#1E2A8E"/>
  <text x="320" y="88" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">Broker</text>
  <text x="320" y="108" text-anchor="middle" font-size="12" fill="#D4AF37">licensed, responsible firm</text>

  <!-- connectors from broker down -->
  <line x1="320" y1="122" x2="320" y2="150" stroke="#374151" stroke-width="2"/>
  <line x1="150" y1="150" x2="490" y2="150" stroke="#374151" stroke-width="2"/>
  <line x1="150" y1="150" x2="150" y2="182" stroke="#374151" stroke-width="2"/>
  <line x1="320" y1="150" x2="320" y2="182" stroke="#374151" stroke-width="2"/>
  <line x1="490" y1="150" x2="490" y2="182" stroke="#374151" stroke-width="2"/>

  <!-- associate boxes -->
  <rect x="70" y="182" width="160" height="58" rx="8" fill="#3E9B6B"/>
  <text x="150" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Sales Associate</text>
  <text x="150" y="227" text-anchor="middle" font-size="11" fill="#ffffff">does the deal work</text>

  <rect x="240" y="182" width="160" height="58" rx="8" fill="#3E9B6B"/>
  <text x="320" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Sales Associate</text>
  <text x="320" y="227" text-anchor="middle" font-size="11" fill="#ffffff">does the deal work</text>

  <rect x="410" y="182" width="160" height="58" rx="8" fill="#C4683A"/>
  <text x="490" y="206" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Broker Associate</text>
  <text x="490" y="225" text-anchor="middle" font-size="11" fill="#ffffff">broker license, works here</text>

  <!-- connectors to clients -->
  <line x1="150" y1="240" x2="150" y2="300" stroke="#374151" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="320" y1="240" x2="320" y2="300" stroke="#374151" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- client boxes -->
  <rect x="70" y="300" width="160" height="52" rx="8" fill="#ffffff" stroke="#1E2A8E" stroke-width="2"/>
  <text x="150" y="331" text-anchor="middle" font-size="13" fill="#111827">Clients (buyers)</text>

  <rect x="240" y="300" width="160" height="52" rx="8" fill="#ffffff" stroke="#1E2A8E" stroke-width="2"/>
  <text x="320" y="331" text-anchor="middle" font-size="13" fill="#111827">Clients (sellers)</text>

  <!-- note -->
  <text x="320" y="388" text-anchor="middle" font-size="12.5" fill="#374151">Clients connect through the associate, but the broker stands behind every deal.</text>
  <text x="320" y="408" text-anchor="middle" font-size="12.5" fill="#374151">All listings, offers, and pay flow through the brokerage.</text>
</svg>
