<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="720" height="460" fill="#ffffff"/>
  <text x="360" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#141B5C">The Three Approaches to Value</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" fill="#374151">Each approach answers value from a different buyer's point of view</text>

  <!-- Sales comparison card -->
  <rect x="30" y="80" width="200" height="300" rx="10" fill="#ffffff" stroke="#1E2A8E" stroke-width="2"/>
  <rect x="30" y="80" width="200" height="46" rx="10" fill="#1E2A8E"/>
  <rect x="30" y="110" width="200" height="16" fill="#1E2A8E"/>
  <text x="130" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Sales Comparison</text>
  <text x="130" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">The question</text>
  <text x="130" y="172" text-anchor="middle" font-size="12" fill="#374151">What did similar</text>
  <text x="130" y="188" text-anchor="middle" font-size="12" fill="#374151">homes recently</text>
  <text x="130" y="204" text-anchor="middle" font-size="12" fill="#374151">sell for?</text>
  <line x1="55" y1="222" x2="205" y2="222" stroke="#E5E7EB" stroke-width="1"/>
  <text x="130" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Best for</text>
  <text x="130" y="266" text-anchor="middle" font-size="12" fill="#374151">Houses, where</text>
  <text x="130" y="282" text-anchor="middle" font-size="12" fill="#374151">many comparable</text>
  <text x="130" y="298" text-anchor="middle" font-size="12" fill="#374151">sales exist</text>
  <line x1="55" y1="316" x2="205" y2="316" stroke="#E5E7EB" stroke-width="1"/>
  <text x="130" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#3E9B6B">Usually weighted</text>
  <text x="130" y="358" text-anchor="middle" font-size="12" fill="#374151">most for homes</text>

  <!-- Cost card -->
  <rect x="260" y="80" width="200" height="300" rx="10" fill="#ffffff" stroke="#C4683A" stroke-width="2"/>
  <rect x="260" y="80" width="200" height="46" rx="10" fill="#C4683A"/>
  <rect x="260" y="110" width="200" height="16" fill="#C4683A"/>
  <text x="360" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Cost</text>
  <text x="360" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">The question</text>
  <text x="360" y="172" text-anchor="middle" font-size="12" fill="#374151">What to rebuild it,</text>
  <text x="360" y="188" text-anchor="middle" font-size="12" fill="#374151">less depreciation,</text>
  <text x="360" y="204" text-anchor="middle" font-size="12" fill="#374151">plus the land?</text>
  <line x1="285" y1="222" x2="435" y2="222" stroke="#E5E7EB" stroke-width="1"/>
  <text x="360" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Best for</text>
  <text x="360" y="266" text-anchor="middle" font-size="12" fill="#374151">New or unusual</text>
  <text x="360" y="282" text-anchor="middle" font-size="12" fill="#374151">property with</text>
  <text x="360" y="298" text-anchor="middle" font-size="12" fill="#374151">few sales</text>
  <line x1="285" y1="316" x2="435" y2="316" stroke="#E5E7EB" stroke-width="1"/>
  <text x="360" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#3E9B6B">Land + cost</text>
  <text x="360" y="358" text-anchor="middle" font-size="12" fill="#374151">minus depreciation</text>

  <!-- Income card -->
  <rect x="490" y="80" width="200" height="300" rx="10" fill="#ffffff" stroke="#D4AF37" stroke-width="2"/>
  <rect x="490" y="80" width="200" height="46" rx="10" fill="#D4AF37"/>
  <rect x="490" y="110" width="200" height="16" fill="#D4AF37"/>
  <text x="590" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#141B5C">Income</text>
  <text x="590" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">The question</text>
  <text x="590" y="172" text-anchor="middle" font-size="12" fill="#374151">What is this</text>
  <text x="590" y="188" text-anchor="middle" font-size="12" fill="#374151">property's income</text>
  <text x="590" y="204" text-anchor="middle" font-size="12" fill="#374151">stream worth?</text>
  <line x1="515" y1="222" x2="665" y2="222" stroke="#E5E7EB" stroke-width="1"/>
  <text x="590" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#141B5C">Best for</text>
  <text x="590" y="266" text-anchor="middle" font-size="12" fill="#374151">Rentals and</text>
  <text x="590" y="282" text-anchor="middle" font-size="12" fill="#374151">commercial,</text>
  <text x="590" y="298" text-anchor="middle" font-size="12" fill="#374151">investment property</text>
  <line x1="515" y1="316" x2="665" y2="316" stroke="#E5E7EB" stroke-width="1"/>
  <text x="590" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#3E9B6B">Value = Income</text>
  <text x="590" y="358" text-anchor="middle" font-size="12" fill="#374151">divided by Rate</text>

  <!-- Reconciliation bar -->
  <rect x="30" y="404" width="660" height="38" rx="8" fill="#141B5C"/>
  <text x="360" y="428" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Reconciliation: weigh the approaches, lean on the most reliable one (never just average)</text>
</svg>
