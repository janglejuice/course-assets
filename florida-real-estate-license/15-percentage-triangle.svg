<svg viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="560" height="420" fill="#ffffff"/>
  <text x="280" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#141B5C">The Part-Total-Rate Triangle</text>
  <text x="280" y="66" text-anchor="middle" font-size="14" fill="#374151">Cover the value you want; the triangle shows the math</text>

  <!-- Outer triangle -->
  <polygon points="280,100 120,330 440,330" fill="#1E2A8E" stroke="#141B5C" stroke-width="3"/>

  <!-- Horizontal divider (the divide bar) -->
  <line x1="170" y1="215" x2="390" y2="215" stroke="#ffffff" stroke-width="3"/>
  <!-- Vertical divider in the lower row (the multiply gap) -->
  <line x1="280" y1="215" x2="280" y2="330" stroke="#ffffff" stroke-width="3"/>

  <!-- Top: PART -->
  <text x="280" y="170" text-anchor="middle" font-size="26" font-weight="bold" fill="#D4AF37">PART</text>
  <text x="280" y="196" text-anchor="middle" font-size="12" fill="#E5E7EB">the commission, interest,</text>
  <text x="280" y="210" text-anchor="middle" font-size="12" fill="#E5E7EB">or tax dollars</text>

  <!-- Bottom-left: TOTAL -->
  <text x="215" y="278" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">TOTAL</text>
  <text x="215" y="300" text-anchor="middle" font-size="11" fill="#E5E7EB">sale price or</text>
  <text x="215" y="314" text-anchor="middle" font-size="11" fill="#E5E7EB">original value</text>

  <!-- Bottom-right: RATE -->
  <text x="345" y="278" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">RATE</text>
  <text x="345" y="300" text-anchor="middle" font-size="11" fill="#E5E7EB">the percent</text>
  <text x="345" y="314" text-anchor="middle" font-size="11" fill="#E5E7EB">(as a decimal)</text>

  <!-- Operation hints -->
  <text x="468" y="206" font-size="13" fill="#3E9B6B" font-weight="bold">horizontal line</text>
  <text x="468" y="222" font-size="13" fill="#3E9B6B" font-weight="bold">= divide</text>
  <text x="92" y="358" font-size="13" fill="#C4683A" font-weight="bold" text-anchor="start">side by side = multiply</text>

  <!-- Three formulas -->
  <text x="280" y="388" text-anchor="middle" font-size="14" fill="#111827" font-weight="bold">part = total x rate</text>
  <text x="280" y="408" text-anchor="middle" font-size="14" fill="#111827">total = part / rate&#160;&#160;&#160;&#160;rate = part / total</text>
</svg>
