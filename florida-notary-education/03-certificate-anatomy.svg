<svg viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="560" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#141B5C">Anatomy of a Florida Notarial Certificate</text>

  <!-- Certificate card -->
  <rect x="170" y="60" width="300" height="440" rx="8" fill="#ffffff" stroke="#1E2A8E" stroke-width="2"/>

  <!-- Venue -->
  <text x="190" y="100" font-size="13" fill="#111827" font-weight="bold">State of Florida</text>
  <text x="190" y="120" font-size="13" fill="#111827">County of ____________</text>
  <line x1="120" y1="105" x2="170" y2="105" stroke="#C4683A" stroke-width="1.5"/>
  <circle cx="120" cy="105" r="4" fill="#C4683A"/>
  <text x="114" y="108" text-anchor="end" font-size="12" fill="#C4683A" font-weight="bold">Venue</text>

  <!-- Act + date wording -->
  <text x="190" y="160" font-size="12.5" fill="#111827">The foregoing instrument was</text>
  <text x="190" y="178" font-size="12.5" fill="#111827">acknowledged before me by means</text>
  <text x="190" y="196" font-size="12.5" fill="#111827">of physical presence this</text>
  <text x="190" y="214" font-size="12.5" fill="#111827">____ day of __________, 20__,</text>
  <line x1="490" y1="178" x2="520" y2="178" stroke="#3E9B6B" stroke-width="1.5"/>
  <circle cx="520" cy="178" r="4" fill="#3E9B6B"/>
  <text x="528" y="171" font-size="12" fill="#3E9B6B" font-weight="bold">Act + presence</text>
  <line x1="490" y1="214" x2="520" y2="214" stroke="#3E9B6B" stroke-width="1.5"/>
  <circle cx="520" cy="214" r="4" fill="#3E9B6B"/>
  <text x="528" y="218" font-size="12" fill="#3E9B6B" font-weight="bold">Date of act</text>

  <!-- Signer + ID -->
  <text x="190" y="250" font-size="12.5" fill="#111827">by ____________________ (name),</text>
  <text x="190" y="268" font-size="12.5" fill="#111827">who is personally known to me</text>
  <text x="190" y="286" font-size="12.5" fill="#111827">or produced ______ as ID.</text>
  <line x1="120" y1="250" x2="170" y2="250" stroke="#D4AF37" stroke-width="1.5"/>
  <circle cx="120" cy="250" r="4" fill="#D4AF37"/>
  <text x="114" y="244" text-anchor="end" font-size="12" fill="#9A7B1E" font-weight="bold">Signer name</text>
  <line x1="120" y1="277" x2="170" y2="277" stroke="#D4AF37" stroke-width="1.5"/>
  <circle cx="120" cy="277" r="4" fill="#D4AF37"/>
  <text x="114" y="281" text-anchor="end" font-size="12" fill="#9A7B1E" font-weight="bold">How identified</text>

  <!-- Notary block -->
  <line x1="190" y1="360" x2="450" y2="360" stroke="#374151" stroke-width="1"/>
  <text x="190" y="378" font-size="12.5" fill="#111827" font-style="italic">Signature (commissioned name)</text>
  <line x1="120" y1="358" x2="170" y2="358" stroke="#1E2A8E" stroke-width="1.5"/>
  <circle cx="120" cy="358" r="4" fill="#1E2A8E"/>
  <text x="114" y="362" text-anchor="end" font-size="12" fill="#1E2A8E" font-weight="bold">Your signature</text>

  <text x="190" y="406" font-size="12.5" fill="#111827">Printed name: ____________</text>
  <line x1="120" y1="402" x2="170" y2="402" stroke="#1E2A8E" stroke-width="1.5"/>
  <circle cx="120" cy="402" r="4" fill="#1E2A8E"/>
  <text x="114" y="406" text-anchor="end" font-size="12" fill="#1E2A8E" font-weight="bold">Printed name</text>

  <!-- Seal placeholder -->
  <circle cx="250" cy="455" r="32" fill="none" stroke="#C4683A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="250" y="459" text-anchor="middle" font-size="10" fill="#C4683A">seal</text>
  <line x1="282" y1="455" x2="350" y2="455" stroke="#C4683A" stroke-width="1.5"/>
  <circle cx="350" cy="455" r="4" fill="#C4683A"/>
  <text x="358" y="452" font-size="12" fill="#C4683A" font-weight="bold">Seal affixed</text>
  <text x="358" y="468" font-size="12" fill="#C4683A" font-weight="bold">+ expiration date</text>
</svg>
