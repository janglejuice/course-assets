<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#141B5C">The Four Required Seal Elements</text>
  <text x="320" y="56" text-anchor="middle" font-size="12" fill="#374151">Rubber stamp, black ink (s. 117.05(3))</text>

  <!-- Stamp impression -->
  <rect x="200" y="120" width="240" height="150" rx="6" fill="#ffffff" stroke="#111827" stroke-width="2.5"/>
  <rect x="210" y="130" width="220" height="130" rx="4" fill="none" stroke="#111827" stroke-width="1"/>

  <text x="320" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Notary Public-State of Florida</text>
  <text x="320" y="192" text-anchor="middle" font-size="14" fill="#111827">Jane A. Sample</text>
  <text x="320" y="220" text-anchor="middle" font-size="13" fill="#111827">Commission # HH 123456</text>
  <text x="320" y="244" text-anchor="middle" font-size="13" fill="#111827">My Comm. Expires Jun 1, 2028</text>

  <!-- Callout 1: title line -->
  <line x1="200" y1="158" x2="90" y2="120" stroke="#1E2A8E" stroke-width="1.5"/>
  <circle cx="200" cy="158" r="4" fill="#1E2A8E"/>
  <text x="84" y="114" text-anchor="end" font-size="13" font-weight="bold" fill="#1E2A8E">1. Title line</text>
  <text x="84" y="131" text-anchor="end" font-size="11" fill="#374151">"Notary Public-State of Florida"</text>

  <!-- Callout 2: commissioned name -->
  <line x1="200" y1="188" x2="90" y2="210" stroke="#3E9B6B" stroke-width="1.5"/>
  <circle cx="200" cy="188" r="4" fill="#3E9B6B"/>
  <text x="84" y="206" text-anchor="end" font-size="13" font-weight="bold" fill="#3E9B6B">2. Commissioned name</text>
  <text x="84" y="223" text-anchor="end" font-size="11" fill="#374151">Exactly as on your commission</text>

  <!-- Callout 3: commission number -->
  <line x1="440" y1="216" x2="550" y2="120" stroke="#C4683A" stroke-width="1.5"/>
  <circle cx="440" cy="216" r="4" fill="#C4683A"/>
  <text x="556" y="114" font-size="13" font-weight="bold" fill="#C4683A">3. Commission number</text>
  <text x="556" y="131" font-size="11" fill="#374151">Your unique state identifier</text>

  <!-- Callout 4: expiration -->
  <line x1="440" y1="240" x2="550" y2="210" stroke="#D4AF37" stroke-width="1.5"/>
  <circle cx="440" cy="240" r="4" fill="#D4AF37"/>
  <text x="556" y="206" font-size="13" font-weight="bold" fill="#9A7B1E">4. Expiration date</text>
  <text x="556" y="223" font-size="11" fill="#374151">Shows your authority is current</text>

  <!-- Embosser note -->
  <rect x="160" y="320" width="320" height="60" rx="6" fill="#ffffff" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="200" cy="350" r="18" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="200" y="354" text-anchor="middle" font-size="9" fill="#374151">raised</text>
  <text x="232" y="345" font-size="11.5" fill="#111827" font-weight="bold">An embosser may supplement</text>
  <text x="232" y="362" font-size="11.5" fill="#C4683A" font-weight="bold">but never replaces the inked stamp.</text>
</svg>
