<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="320" fill="#FFFFFF"/>
  <text x="32" y="40" font-size="20" font-weight="bold" fill="#141B5C">The Marriage Solemnization Workflow</text>
  <text x="32" y="64" font-size="13" fill="#374151">Every deadline is read off the license itself, never from memory.</text>

  <!-- effective window band -->
  <rect x="150" y="92" width="300" height="26" rx="6" fill="#D4AF37" fill-opacity="0.22" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="300" y="110" font-size="12" font-weight="bold" fill="#141B5C" text-anchor="middle">License effective window (dates printed on the license)</text>

  <!-- timeline baseline -->
  <line x1="60" y1="170" x2="700" y2="170" stroke="#E5E7EB" stroke-width="3"/>

  <!-- nodes -->
  <!-- 1 issue -->
  <circle cx="100" cy="170" r="13" fill="#1E2A8E"/>
  <text x="100" y="175" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="100" y="208" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">Couple gets</text>
  <text x="100" y="224" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">FL license</text>
  <text x="100" y="244" font-size="11" fill="#374151" text-anchor="middle">From a county clerk</text>

  <!-- 2 verify -->
  <circle cx="270" cy="170" r="13" fill="#1E2A8E"/>
  <text x="270" y="175" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="270" y="208" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">You verify</text>
  <text x="270" y="224" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">and identify</text>
  <text x="270" y="244" font-size="11" fill="#374151" text-anchor="middle">FL issued, in window</text>

  <!-- 3 ceremony -->
  <circle cx="430" cy="170" r="13" fill="#3E9B6B"/>
  <text x="430" y="175" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="430" y="208" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">Ceremony</text>
  <text x="430" y="224" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">+ declaration</text>
  <text x="430" y="244" font-size="11" fill="#374151" text-anchor="middle">Both say "I do"</text>

  <!-- 4 complete -->
  <circle cx="580" cy="170" r="13" fill="#C4683A"/>
  <text x="580" y="175" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="580" y="208" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">Complete the</text>
  <text x="580" y="224" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">record</text>
  <text x="580" y="244" font-size="11" fill="#374151" text-anchor="middle">Sign solemnization</text>

  <!-- 5 return -->
  <circle cx="680" cy="170" r="13" fill="#C4683A"/>
  <text x="680" y="175" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="680" y="208" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">Return to</text>
  <text x="680" y="224" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">clerk</text>

  <!-- return deadline callout -->
  <rect x="520" y="270" width="220" height="34" rx="6" fill="#141B5C"/>
  <text x="630" y="285" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Return within the window the</text>
  <text x="630" y="299" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">license states. Same day is best.</text>

  <!-- gate note -->
  <text x="270" y="138" font-size="11" font-style="italic" fill="#C4683A" text-anchor="middle">No license, no ceremony</text>
</svg>
