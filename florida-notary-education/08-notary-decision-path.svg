<svg viewBox="0 0 880 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="880" height="620" fill="#FFFFFF"/>
  <text x="40" y="44" font-size="22" font-weight="bold" fill="#141B5C">The Florida Notary Decision Path</text>
  <text x="40" y="68" font-size="13" fill="#374151">Every request runs down this column. Any check that fails sends you to "Refuse" (right).</text>

  <!-- Legend -->
  <rect x="612" y="30" width="14" height="14" rx="2" fill="#1E2A8E"/>
  <text x="632" y="42" font-size="12" fill="#374151">Decision</text>
  <rect x="612" y="50" width="14" height="14" rx="2" fill="#3E9B6B"/>
  <text x="632" y="62" font-size="12" fill="#374151">Action</text>
  <rect x="612" y="70" width="14" height="14" rx="2" fill="#C4683A"/>
  <text x="632" y="82" font-size="12" fill="#374151">Refuse</text>

  <!-- Start -->
  <rect x="270" y="92" width="200" height="40" rx="20" fill="#D4AF37"/>
  <text x="370" y="117" font-size="14" font-weight="bold" fill="#141B5C" text-anchor="middle">Request to notarize</text>

  <!-- Connector lines down the spine -->
  <g stroke="#1E2A8E" stroke-width="2" fill="none">
    <line x1="370" y1="132" x2="370" y2="150"/>
    <line x1="370" y1="194" x2="370" y2="212"/>
    <line x1="370" y1="256" x2="370" y2="274"/>
    <line x1="370" y1="318" x2="370" y2="336"/>
    <line x1="370" y1="380" x2="370" y2="398"/>
    <line x1="370" y1="442" x2="370" y2="460"/>
    <line x1="370" y1="504" x2="370" y2="522"/>
  </g>

  <!-- Refuse branch lines (terracotta) -->
  <g stroke="#C4683A" stroke-width="2" fill="none" stroke-dasharray="5 4">
    <line x1="470" y1="172" x2="700" y2="172"/>
    <line x1="470" y1="234" x2="700" y2="234"/>
    <line x1="470" y1="296" x2="700" y2="296"/>
    <line x1="470" y1="420" x2="700" y2="420"/>
    <line x1="700" y1="172" x2="700" y2="300"/>
  </g>

  <!-- Decision steps (navy) -->
  <g>
    <rect x="190" y="150" width="360" height="44" rx="6" fill="#1E2A8E"/>
    <text x="370" y="170" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1. Document complete, no blanks?</text>
    <text x="370" y="187" font-size="11" fill="#E5E7EB" text-anchor="middle">Module 5: prohibited acts</text>
  </g>
  <g>
    <rect x="190" y="212" width="360" height="44" rx="6" fill="#1E2A8E"/>
    <text x="370" y="232" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2. Signer physically present?</text>
    <text x="370" y="249" font-size="11" fill="#E5E7EB" text-anchor="middle">Module 2: physical presence</text>
  </g>
  <g>
    <rect x="190" y="274" width="360" height="44" rx="6" fill="#1E2A8E"/>
    <text x="370" y="294" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3. Identified: known, ID, or witness?</text>
    <text x="370" y="311" font-size="11" fill="#E5E7EB" text-anchor="middle">Module 4: identification</text>
  </g>
  <g>
    <rect x="190" y="336" width="360" height="44" rx="6" fill="#1E2A8E"/>
    <text x="370" y="356" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4. Which act does the certificate call for?</text>
    <text x="370" y="373" font-size="11" fill="#E5E7EB" text-anchor="middle">Module 2: act selection</text>
  </g>
  <g>
    <rect x="190" y="398" width="360" height="44" rx="6" fill="#1E2A8E"/>
    <text x="370" y="418" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5. Any conflict or interest?</text>
    <text x="370" y="435" font-size="11" fill="#E5E7EB" text-anchor="middle">Module 5: conflict of interest</text>
  </g>
  <g>
    <rect x="190" y="460" width="360" height="44" rx="6" fill="#1E2A8E"/>
    <text x="370" y="480" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6. Fee within the cap and quoted?</text>
    <text x="370" y="497" font-size="11" fill="#E5E7EB" text-anchor="middle">Module 5: authorized fees</text>
  </g>

  <!-- Final action (green) -->
  <g>
    <rect x="150" y="522" width="440" height="58" rx="8" fill="#3E9B6B"/>
    <text x="370" y="546" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">7. Complete the certificate, then seal, sign, journal</text>
    <text x="370" y="566" font-size="11" fill="#EAF6EF" text-anchor="middle">Module 3: certificate, seal, recordkeeping</text>
  </g>

  <!-- Refuse box -->
  <rect x="660" y="300" width="190" height="80" rx="8" fill="#C4683A"/>
  <text x="755" y="332" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Refuse</text>
  <text x="755" y="352" font-size="11" fill="#FBEAE2" text-anchor="middle">Any "no" stops here.</text>
  <text x="755" y="368" font-size="11" fill="#FBEAE2" text-anchor="middle">Lawful and protective.</text>

  <!-- "No" labels on branches -->
  <g font-size="11" font-weight="bold" fill="#C4683A">
    <text x="556" y="168">No</text>
    <text x="556" y="230">No</text>
    <text x="556" y="292">No</text>
    <text x="556" y="416">No</text>
  </g>
</svg>
