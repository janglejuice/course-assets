<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="420" fill="#FFFFFF"/>
  <text x="380" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#141B5C">Reading the Certificate to Name the Act</text>
  <text x="380" y="54" text-anchor="middle" font-size="13" fill="#374151">Start at the document's certificate wording, then follow it down to one of three acts</text>

  <!-- Start box -->
  <rect x="280" y="74" width="200" height="48" rx="6" fill="#1E2A8E"/>
  <text x="380" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Read the certificate at the</text>
  <text x="380" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">bottom of the document</text>

  <!-- connector down -->
  <line x1="380" y1="122" x2="380" y2="150" stroke="#374151" stroke-width="2"/>
  <polygon points="380,150 375,142 385,142" fill="#374151"/>

  <!-- Decision diamond -->
  <polygon points="380,150 510,205 380,260 250,205" fill="#FFFFFF" stroke="#C4683A" stroke-width="2"/>
  <text x="380" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#141B5C">What does the</text>
  <text x="380" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#141B5C">wording say?</text>

  <!-- left branch: acknowledges -->
  <line x1="250" y1="205" x2="135" y2="205" stroke="#374151" stroke-width="2"/>
  <line x1="135" y1="205" x2="135" y2="300" stroke="#374151" stroke-width="2"/>
  <polygon points="135,300 130,292 140,292" fill="#374151"/>
  <text x="192" y="198" text-anchor="middle" font-size="11" fill="#374151">"acknowledged</text>
  <text x="192" y="212" text-anchor="middle" font-size="11" fill="#374151">before me"</text>

  <!-- middle branch: sworn -->
  <line x1="380" y1="260" x2="380" y2="300" stroke="#374151" stroke-width="2"/>
  <polygon points="380,300 375,292 385,292" fill="#374151"/>
  <text x="380" y="284" text-anchor="middle" font-size="11" fill="#374151">"sworn to and subscribed"</text>

  <!-- right branch: oath only -->
  <line x1="510" y1="205" x2="625" y2="205" stroke="#374151" stroke-width="2"/>
  <line x1="625" y1="205" x2="625" y2="300" stroke="#374151" stroke-width="2"/>
  <polygon points="625,300 620,292 630,292" fill="#374151"/>
  <text x="625" y="198" text-anchor="middle" font-size="11" fill="#374151">no document,</text>
  <text x="625" y="212" text-anchor="middle" font-size="11" fill="#374151">a spoken promise</text>

  <!-- Act boxes -->
  <rect x="55" y="300" width="160" height="80" rx="6" fill="#3E9B6B"/>
  <text x="135" y="328" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Acknowledgment</text>
  <text x="135" y="350" text-anchor="middle" font-size="11" fill="#FFFFFF">Signer says they signed</text>
  <text x="135" y="365" text-anchor="middle" font-size="11" fill="#FFFFFF">freely. May be pre-signed.</text>

  <rect x="300" y="300" width="160" height="80" rx="6" fill="#1E2A8E"/>
  <text x="380" y="328" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Jurat</text>
  <text x="380" y="350" text-anchor="middle" font-size="11" fill="#FFFFFF">Signer signs AND swears</text>
  <text x="380" y="365" text-anchor="middle" font-size="11" fill="#FFFFFF">in front of you.</text>

  <rect x="545" y="300" width="160" height="80" rx="6" fill="#C4683A"/>
  <text x="625" y="328" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Oath / Affirmation</text>
  <text x="625" y="350" text-anchor="middle" font-size="11" fill="#FFFFFF">A spoken promise of</text>
  <text x="625" y="365" text-anchor="middle" font-size="11" fill="#FFFFFF">truth, with or without paper.</text>

  <text x="380" y="405" text-anchor="middle" font-size="11" fill="#374151">The signer or the receiving agency picks the act. You read the wording and perform it. You never choose it for them.</text>
</svg>
