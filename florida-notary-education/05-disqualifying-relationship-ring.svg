<svg viewBox="0 0 640 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="640" height="460" fill="#FFFFFF"/>
  <text x="320" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#141B5C">Who You May Not Notarize For</text>

  <!-- Outer ring: financial interest -->
  <circle cx="320" cy="250" r="180" fill="#C4683A" opacity="0.12" stroke="#C4683A" stroke-width="2"/>
  <!-- Inner ring: barred by name -->
  <circle cx="320" cy="250" r="118" fill="#1E2A8E" opacity="0.14" stroke="#1E2A8E" stroke-width="2"/>
  <!-- Center: the notary -->
  <circle cx="320" cy="250" r="52" fill="#141B5C"/>
  <text x="320" y="246" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">You</text>
  <text x="320" y="266" text-anchor="middle" font-size="12" fill="#FFFFFF">the notary</text>

  <!-- Inner ring labels: spouse, parent, child (s. 117.107(11)) -->
  <text x="320" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E2A8E">Spouse</text>
  <text x="228" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E2A8E">Parent</text>
  <text x="412" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E2A8E">Child</text>

  <!-- Inner ring caption -->
  <rect x="208" y="332" width="224" height="26" rx="6" fill="#1E2A8E"/>
  <text x="320" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Barred by name (s. 117.107(11))</text>

  <!-- Outer ring label -->
  <text x="320" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#C4683A">Financial or beneficial interest</text>
  <text x="320" y="428" text-anchor="middle" font-size="13" fill="#374151">Any stake in the deal disqualifies you, including a sibling or in-law</text>

  <!-- Legend -->
  <rect x="40" y="408" width="16" height="16" rx="3" fill="#1E2A8E" opacity="0.6"/>
  <text x="62" y="421" font-size="12" fill="#111827">Flat bar</text>
  <rect x="40" y="430" width="16" height="16" rx="3" fill="#C4683A" opacity="0.6"/>
  <text x="62" y="443" font-size="12" fill="#111827">Money test</text>
</svg>
