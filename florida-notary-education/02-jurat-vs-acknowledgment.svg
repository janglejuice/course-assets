<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="400" fill="#FFFFFF"/>
  <text x="380" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#141B5C">Jurat or Acknowledgment? Two Questions</text>
  <text x="380" y="54" text-anchor="middle" font-size="13" fill="#374151">Both need the signer in front of you. These two questions tell them apart.</text>

  <!-- Question 1 -->
  <rect x="230" y="78" width="300" height="52" rx="6" fill="#1E2A8E"/>
  <text x="380" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Question 1: Where was it signed?</text>
  <text x="380" y="120" text-anchor="middle" font-size="12" fill="#FFFFFF">In front of you, or before they arrived?</text>

  <!-- branch from Q1 -->
  <line x1="380" y1="130" x2="380" y2="150" stroke="#374151" stroke-width="2"/>
  <line x1="190" y1="150" x2="570" y2="150" stroke="#374151" stroke-width="2"/>

  <!-- left: already signed -->
  <line x1="190" y1="150" x2="190" y2="180" stroke="#374151" stroke-width="2"/>
  <polygon points="190,180 185,172 195,172" fill="#374151"/>
  <text x="190" y="168" text-anchor="middle" font-size="11" fill="#374151">already signed</text>

  <!-- right: signs now, leads to Q2 -->
  <line x1="570" y1="150" x2="570" y2="180" stroke="#374151" stroke-width="2"/>
  <polygon points="570,180 565,172 575,172" fill="#374151"/>
  <text x="570" y="168" text-anchor="middle" font-size="11" fill="#374151">signs in front of you</text>

  <!-- Left outcome: acknowledgment -->
  <rect x="90" y="180" width="200" height="74" rx="6" fill="#3E9B6B"/>
  <text x="190" y="206" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Acknowledgment</text>
  <text x="190" y="227" text-anchor="middle" font-size="11" fill="#FFFFFF">They confirm out loud that</text>
  <text x="190" y="242" text-anchor="middle" font-size="11" fill="#FFFFFF">they signed freely.</text>

  <!-- Question 2 -->
  <rect x="430" y="180" width="280" height="74" rx="6" fill="#D4AF37"/>
  <text x="570" y="206" text-anchor="middle" font-size="14" font-weight="bold" fill="#141B5C">Question 2: Did they swear it?</text>
  <text x="570" y="227" text-anchor="middle" font-size="11" fill="#141B5C">Did you administer an oath or</text>
  <text x="570" y="242" text-anchor="middle" font-size="11" fill="#141B5C">affirmation to the truth of it?</text>

  <!-- branch from Q2 -->
  <line x1="570" y1="254" x2="570" y2="274" stroke="#374151" stroke-width="2"/>
  <line x1="470" y1="274" x2="670" y2="274" stroke="#374151" stroke-width="2"/>
  <line x1="470" y1="274" x2="470" y2="300" stroke="#374151" stroke-width="2"/>
  <line x1="670" y1="274" x2="670" y2="300" stroke="#374151" stroke-width="2"/>
  <polygon points="470,300 465,292 475,292" fill="#374151"/>
  <polygon points="670,300 665,292 675,292" fill="#374151"/>
  <text x="470" y="290" text-anchor="middle" font-size="11" fill="#374151">yes, sworn</text>
  <text x="670" y="290" text-anchor="middle" font-size="11" fill="#374151">no oath</text>

  <!-- Jurat outcome -->
  <rect x="370" y="300" width="200" height="70" rx="6" fill="#1E2A8E"/>
  <text x="470" y="326" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Jurat</text>
  <text x="470" y="347" text-anchor="middle" font-size="11" fill="#FFFFFF">Signed AND sworn in front</text>
  <text x="470" y="362" text-anchor="middle" font-size="11" fill="#FFFFFF">of you. Never pre-signed.</text>

  <!-- not a notarial act outcome -->
  <rect x="580" y="300" width="170" height="70" rx="6" fill="#FFFFFF" stroke="#C4683A" stroke-width="2"/>
  <text x="665" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#C4683A">Stop and check</text>
  <text x="665" y="346" text-anchor="middle" font-size="10" fill="#374151">A signature with no oath</text>
  <text x="665" y="360" text-anchor="middle" font-size="10" fill="#374151">may need the acknowledgment.</text>
</svg>
